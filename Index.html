        }

           color:#4b6352;

}

            height: 100%;

            flex-direction: column;
            align-items: center;

            text-align: center;

        }

        function updateProgress() {
            if (initialCount === 0) return;
            let viewed = initialCount - wordList.length;
            let percentage = (viewed / initialCount) * 100;
            document.getElementById('progress-fill').style.width = percentage + "%";
        }

        function speakCurrentWord(event) {
            if (event) event.stopPropagation();

            const text = wordList[currentIndex].en;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }

        function toggleStar(event) {
            event.stopPropagation();
            const word = wordList[currentIndex];
            if (!word) return;
            const alreadyStarred = starredWords.some(w => w.en === word.en);
            if (alreadyStarred) {
                starredWords = starredWords.filter(w => w.en !== word.en);
                starBtn.classList.remove('active');
            } else {
                starredWords.push(word);
                starBtn.classList.add('active');
            }
        }

            document.getElementById('ex-en').innerText = wordList[currentIndex].exEn;
            document.getElementById('word-mn').innerText = wordList[currentIndex].mn;

            // Grammar нүүрэн тал: зөвхөн жишээ өгүүлбэр (frontDetail хэрэггүй)
            const frontDetailEl = document.getElementById('grammar-front-detail');
            frontDetailEl.classList.remove('visible');
            frontDetailEl.innerText = '';

            const isGrammar = (currentCategory === 'grammar');
            const relEl = document.getElementById('word-relations');
            const backDetailEl = document.getElementById('grammar-back-detail');

            if (isGrammar) {
                // Grammar арын талд: орчуулга, нэр харуулахгүй — зөвхөн тайлбар
                relEl.style.display = 'none';
                document.getElementById('back-en-word').style.display = 'none';
                document.getElementById('word-mn').style.display = 'none';
                backDetailEl.innerText = wordList[currentIndex].backDetail || '';
                backDetailEl.classList.add('visible');
            } else {
                relEl.style.display = 'flex';
                document.getElementById('back-en-word').style.display = 'block';
                document.getElementById('word-mn').style.display = 'block';
                backDetailEl.classList.remove('visible');
                backDetailEl.innerText = '';
                document.getElementById('word-col').innerText = wordList[currentIndex].col || "—";
            }

            updateProgress();
        }

        let startX = 0, startY = 0;
        let currentX = 0, currentY = 0;
        let isSwiping = false;

        const grammarDetail = document.getElementById('grammar-back-detail');

        // Grammar тайлбар дотор touch хийхэд картын swipe блоклох
        grammarDetail.addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive: true });
        grammarDetail.addEventListener('touchmove', (e) => { e.stopPropagation(); }, { passive: true });
        grammarDetail.addEventListener('touchend', (e) => { e.stopPropagation(); });

        card.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            currentX = startX;
            currentY = startY;
            isSwiping = true;
            card.style.transition = "none";
        });

        card.addEventListener('touchmove', (e) => {
            if (!isSwiping) return;
            currentX = e.touches[0].clientX;
            currentY = e.touches[0].clientY;

            let diffX = currentX - startX;
            let diffY = currentY - startY;

            card.style.left = diffX + "px";
            card.style.top = diffY + "px";
            card.style.transform = `rotate(${diffX * 0.08}deg)`;

            if (diffX > 20) {
                card.style.boxShadow = "0 25px 40px rgba(76, 175, 80, 0.25), 0 5px 15px rgba(0, 0, 0, 0.02)";
                card.style.borderColor = "rgba(76, 175, 80, 0.3)";
            } else if (diffX < -20) {
                card.style.boxShadow = "0 25px 40px rgba(244, 67, 54, 0.22), 0 5px 15px rgba(0, 0, 0, 0.02)";
                card.style.borderColor = "rgba(244, 67, 54, 0.25)";
            } else {
                card.style.boxShadow = "var(--default-shadow)";
                card.style.borderColor = "rgba(39, 174, 96, 0.45)";
            }
        });

        card.addEventListener('touchend', (e) => {
            if (!isSwiping) return;
            isSwiping = false;

            card.style.transition = "transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15), left 0.2s, top 0.2s, opacity 0.2s, box-shadow 0.2s, border-color 0.2s";

            let diffX = currentX - startX;
            let diffY = currentY - startY;

            if (Math.abs(diffX) > 80 && Math.abs(diffX) > Math.abs(diffY) * 0.6) {
                if (diffX > 80) {
                    card.style.left = "400px"; card.style.opacity = "0";
                    setTimeout(() => {
                        wordList.splice(currentIndex, 1); showWord();
                    }, 120);
                } else if (diffX < -80) {
                    card.style.left = "-400px"; card.style.opacity = "0";
                    setTimeout(() => {
                        currentIndex++; showWord();
                    }, 120);
                }
            } else {
                if (diffY < -50 && Math.abs(diffY) > Math.abs(diffX)) {
                    isFlipped = !isFlipped;
                    if (isFlipped) card.classList.add('flipped');
                    else card.classList.remove('flipped');
                }
                card.style.left = "0px";
                card.style.top = "0px";
                card.style.transform = "rotate(0deg)";
                card.style.boxShadow = "var(--default-shadow)";
                card.style.borderColor = "rgba(39, 174, 96, 0.45)";
            }
        });

        showWord();
    </script>
</body>
</html>
