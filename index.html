<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowVocab Premium 100+</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --surface-color: #ffffff;
            --text-main: #111111;
            --text-sub: #666666;
            --primary: #58cc02;
            --border-color: #e5e5e5;
            --card-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
            --know-color: #58cc02;
            --notknow-color: #ff4b4b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .menu-container {
            padding: 16px;
            background: var(--surface-color);
            border-bottom: 2px solid var(--border-color);
            display: flex;
            gap: 12px;
            overflow-x: auto;
            white-space: nowrap;
        }
        .menu-container::-webkit-scrollbar { display: none; }
        
        .menu-btn {
            background: #f1f1f1;
            color: #4b4b4b;
            border: none;
            padding: 10px 20px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border-bottom: 2px solid #e5e5e5;
            transition: all 0.15s;
        }
        .menu-btn.active {
            background: var(--primary);
            color: white;
            border-bottom: 2px solid #46a302;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        .desc {
            color: var(--text-sub);
            font-size: 13px;
            text-align: center;
            line-height: 1.5;
            max-width: 320px;
            margin-bottom: 30px;
        }

        .card-container {
            width: 100%;
            max-width: 340px;
            height: 400px;
            position: relative;
        }

        .card {
            width: 100%;
            height: 100%;
            position: absolute;
            box-shadow: var(--card-shadow);
            border-radius: 26px;
            cursor: pointer;
            border: 2px solid var(--border-color);
            background-color: var(--surface-color);
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-sizing: border-box;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), left 0.3s, top 0.3s, opacity 0.3s;
        }

        .card .front-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .card .back-content {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
        }

        .card.flipped .front-content { display: none; }
        .card.flipped .back-content { display: flex; }
        .card.flipped {
            border-color: #ced4da;
            background-color: #fefefe;
        }

        .word {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 12px;
            color: #111;
            word-break: break-word;
        }

        .tag {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #777;
            background: #f1f1f1;
            padding: 6px 14px;
            border-radius: 10px;
        }

        .translation {
            font-size: 23px;
            font-weight: 800;
            color: #155724;
            margin-top: 10px;
        }

        .example-box {
            background: #f8f9fa;
            padding: 18px;
            border-radius: 20px;
            text-align: left;
            width: 100%;
            border-left: 5px solid var(--primary);
            margin-top: auto;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .ex-en {
            font-style: italic;
            margin-bottom: 8px;
            color: #222;
            font-weight: 600;
            font-size: 14px;
            line-height: 1.4;
        }

        .ex-mn {
            color: var(--text-sub);
            font-size: 12px;
            line-height: 1.4;
        }

        .stats {
            margin-top: 30px;
            font-size: 14px;
            font-weight: 700;
            color: #aaa;
            letter-spacing: 0.5px;
        }

        .action-hint {
            position: absolute;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 18px;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.1s;
            z-index: 10;
        }
        .hint-know { right: 10px; top: -40px; background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .hint-not { left: 10px; top: -40px; background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .hint-reveal { left: 50%; transform: translateX(-50%); bottom: -40px; background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }
    </style>
</head>

        const card = document.getElementById('card');
        const hintKnow = document.querySelector('.hint-know');
        const hintNot = document.querySelector('.hint-not');
        const hintReveal = document.querySelector('.hint-reveal');

        function changeCategory(categoryKey, element) {
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            currentCategory = categoryKey;
            wordList = [...dataSources[currentCategory]];
            currentIndex = 0;
            showWord();
        }

        function showWord() {
            isFlipped = false;
            card.classList.remove('flipped');
            card.style.left = "0px";
            card.style.top = "0px";
            card.style.transform = "rotate(0deg)";
            card.style.opacity = "1";
            
            if (wordList.length === 0) {
                document.getElementById('word-en').innerText = "Дууслаа 🎉";
                document.getElementById('word-pos').style.display = "none";
                card.classList.add('flipped');
                document.getElementById('word-mn').innerText = "Баяр хүргэе!";
                document.getElementById('ex-en').innerText = "Энэ бүлгийг бүрэн дуусгалаа.";
                document.getElementById('ex-mn').innerText = "Дээд цэснээс өөр ангиллыг сонгоорой.";
                document.getElementById('stats').innerText = "Remaining: 0";
                return;
            }
            
            document.getElementById('word-pos').style.display = "inline-block";
            if (currentIndex >= wordList.length) currentIndex = 0;
            
            document.getElementById('word-en').innerText = wordList[currentIndex].en;
            document.getElementById('word-pos').innerText = wordList[currentIndex].pos;
            document.getElementById('word-mn').innerText = wordList[currentIndex].mn;
            document.getElementById('ex-en').innerText = wordList[currentIndex].exEn;
            document.getElementById('ex-mn').innerText = wordList[currentIndex].exMn;
            document.getElementById('stats').innerText = `Remaining: `;
        }

        let startX = 0, startY = 0;
        let currentX = 0, currentY = 0;
        let isSwiping = false;

        card.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            currentX = startX;
            currentY = startY;
            isSwiping = true;
            card.style.transition = "none";
        });

        card.addEventListener('touchmove', (e) => {
            if (!isSwiping) return;
            currentX = e.touches[0].clientX;
            currentY = e.touches[0].clientY;
            
            let diffX = currentX - startX;
            let diffY = currentY - startY;
            
            if (Math.abs(diffX) > Math.abs(diffY)) {
                card.style.left = diffX + "px";
                card.style.top = "0px";
                card.style.transform = `rotate(deg)`;
                if (diffX > 60) {
                    hintKnow.style.opacity = "1"; hintNot.style.opacity = "0";
                } else if (diffX < -60) {
                    hintNot.style.opacity = "1"; hintKnow.style.opacity = "0";
                } else {
                    hintKnow.style.opacity = "0"; hintNot.style.opacity = "0";
                }
            } else {
                if (diffY < 0) {
                    card.style.top = diffY + "px";
                    card.style.left = "0px";
                    if (diffY < -50 && !isFlipped) hintReveal.style.opacity = "1";
                }
            }
        });

        card.addEventListener('touchend', (e) => {
            if (!isSwiping) return;
            isSwiping = false;
            card.style.transition = "transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), left 0.3s, top 0.3s, opacity 0.3s";
            hintKnow.style.opacity = "0"; hintNot.style.opacity = "0"; hintReveal.style.opacity = "0";

            let diffX = currentX - startX;
            let diffY = currentY - startY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 100) {
                    card.style.left = "400px"; card.style.opacity = "0";
                    setTimeout(() => { wordList.splice(currentIndex, 1); showWord(); }, 200);
                } else if (diffX < -100) {
                    card.style.left = "-400px"; card.style.opacity = "0";
                    setTimeout(() => { currentIndex++; showWord(); }, 200);
                } else { card.style.left = "0px"; card.style.transform = "rotate(0deg)"; }
            } else {
                if (diffY < -70) {
                    isFlipped = true;
                    card.classList.add('flipped');
                    card.style.top = "0px";
                } else { card.style.top = "0px"; }
            }
        });

        showWord();
    </script>
</body>
</html>
